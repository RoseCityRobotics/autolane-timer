<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Autolane Timer</title>
<style>
  @font-face {
    font-family: 'Bureau Grot';
    src: url('https://cdn.prod.website-files.com/6744cfc4e508ac28c650507d/67960a3e9f33ccbf2391ddb1_font.woff') format('woff');
    font-weight: 700;
    font-style: normal;
    font-display: swap;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FFFBF4;
    --teal: #027F83;
    --teal-light: #D9EDF0;
    --teal-dark: #015f63;
    --text: #221F1F;
    --text-muted: rgba(34,31,31,0.4);
    --border: rgba(34,31,31,0.12);
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
  }

  .bg-shape {
    position: fixed;
    top: 0; left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 0;
    preserveAspectRatio: xMidYMid slice;
  }

  .logo {
    position: fixed;
    top: 32px;
    left: 50%;
    transform: translateX(-50%);
    z-index: 2;
  }

  .logo img { height: 32px; }

  .timer-wrap {
    text-align: center;
    position: relative;
    z-index: 1;
  }

  .label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }

  .time-display {
    font-size: clamp(120px, 22vw, 200px);
    font-family: 'Bureau Grot', Impact, sans-serif;
    font-weight: 700;
    letter-spacing: -0.04em;
    line-height: 1;
    color: var(--text);
    font-variant-numeric: tabular-nums;
    transition: color 0.4s ease;
  }

  .time-display.warning { color: #9a4e00; }

  .time-display.urgent {
    color: #c0321a;
    animation: pulse 0.9s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  #mins, #secs {
    display: inline-block;
    width: 1.1em;
    text-align: center;
  }

  .sep {
    display: inline-block;
    animation: blink 1s step-end infinite;
  }
  .sep.paused { animation: none; opacity: 1; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.1; }
  }

  .progress-bar {
    width: 340px;
    height: 3px;
    background: rgba(17,17,17,0.1);
    border-radius: 99px;
    margin: 28px auto 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    background: var(--teal);
    border-radius: 99px;
    width: 100%;
    transition: width 1s linear;
  }

  .controls {
    margin-top: 40px;
    display: flex;
    gap: 10px;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    padding: 10px 24px;
    border-radius: 100px;
  }

  .btn {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 12px 28px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn:hover {
    border-color: rgba(17,17,17,0.35);
    background: rgba(17,17,17,0.05);
  }

  .btn.primary {
    background: var(--teal);
    color: #fff;
    border-color: var(--teal);
  }

  .btn.primary:hover {
    background: var(--teal-dark);
    border-color: var(--teal-dark);
  }

  .btn.running {
    background: var(--teal-light);
    color: var(--teal-dark);
    border-color: var(--teal-light);
  }

  .timer-select {
    position: fixed;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    display: flex;
    gap: 8px;
    z-index: 2;
  }

  .timer-pill {
    background: transparent;
    border: 1.5px solid var(--border);
    color: var(--text-muted);
    font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    padding: 9px 22px;
    border-radius: 100px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .timer-pill:hover {
    border-color: rgba(17,17,17,0.3);
    color: var(--text);
  }

  .timer-pill.active {
    background: var(--teal);
    color: #fff;
    border-color: var(--teal);
  }

  .done-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: var(--teal);
    align-items: center;
    justify-content: center;
    flex-direction: column;
    gap: 14px;
    z-index: 10;
    cursor: pointer;
  }

  .done-overlay.show { display: flex; }

  .done-text {
    font-size: 56px;
    font-weight: 800;
    letter-spacing: -0.03em;
    color: #fff;
    animation: fadeUp 0.5s ease;
  }

  .done-sub {
    font-size: 12px;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.6);
    animation: fadeUp 0.5s ease 0.1s both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>

<div class="timer-wrap">
  <div class="label" id="timer-label">Next Pickup Arriving in</div>
  <div class="time-display" id="display">
    <span id="mins">10</span><span class="sep" id="sep">:</span><span id="secs">00</span>
  </div>
  <div class="progress-bar">
    <div class="progress-fill" id="progress"></div>
  </div>
  <div class="controls">
    <button class="btn" onclick="resetTimer()">Reset</button>
    <button class="btn primary" id="start-btn" onclick="toggleTimer()">Start</button>
  </div>
</div>

<div class="timer-select">
  <button class="timer-pill active" id="pill-10" onclick="setTimer(10)">10 min</button>
  <button class="timer-pill" id="pill-15" onclick="setTimer(15)">15 min</button>
</div>

<div class="done-overlay" id="done-overlay" onclick="resetTimer()">
  <div class="done-text">Time's Up</div>
  <div class="done-sub">Tap anywhere to reset</div>
</div>

<script>
  let totalSeconds = 600, remaining = 600, interval = null, running = false, selectedMinutes = 10;

  function setTimer(mins) {
    if (running) return;
    selectedMinutes = mins; totalSeconds = mins * 60; remaining = totalSeconds;
    updateDisplay(); updateProgress();
    document.querySelectorAll('.timer-pill').forEach(p => p.classList.remove('active'));
    document.getElementById('pill-' + mins).classList.add('active');
  }

  function toggleTimer() { running ? pauseTimer() : startTimer(); }

  function startTimer() {
    if (remaining <= 0) return;
    running = true;
    const btn = document.getElementById('start-btn');
    btn.textContent = 'Pause'; btn.className = 'btn running';
    document.getElementById('sep').classList.remove('paused');
    interval = setInterval(tick, 1000);
  }

  function pauseTimer() {
    running = false; clearInterval(interval);
    const btn = document.getElementById('start-btn');
    btn.textContent = 'Resume'; btn.className = 'btn primary';
    document.getElementById('sep').classList.add('paused');
  }

  function resetTimer() {
    running = false; clearInterval(interval); remaining = totalSeconds;
    const btn = document.getElementById('start-btn');
    btn.textContent = 'Start'; btn.className = 'btn primary';
    document.getElementById('sep').classList.remove('paused');
    document.getElementById('display').className = 'time-display';
    document.getElementById('done-overlay').classList.remove('show');
    updateDisplay(); updateProgress();
  }

  function tick() {
    remaining--; updateDisplay(); updateProgress(); updateWarning();
    if (remaining <= 0) { clearInterval(interval); running = false; document.getElementById('done-overlay').classList.add('show'); }
  }

  function updateDisplay() {
    document.getElementById('mins').textContent = String(Math.floor(remaining/60)).padStart(2,'0');
    document.getElementById('secs').textContent = String(remaining%60).padStart(2,'0');
  }

  function updateProgress() {
    document.getElementById('progress').style.width = (remaining/totalSeconds*100)+'%';
  }

  function updateWarning() {
    const el = document.getElementById('display'), pct = remaining/totalSeconds;
    if (remaining <= 30) el.className = 'time-display urgent';
    else if (pct <= 0.2) el.className = 'time-display warning';
    else el.className = 'time-display';
  }

  updateDisplay();
</script>
</body>
</html>
